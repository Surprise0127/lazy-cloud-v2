spring:
  application:
    name: lazy-admin

  threads:
    virtual:
      enabled: true

  datasource:
    driver-class-name: org.postgresql.Driver
    password: "123456"
    username: xykd
    url: jdbc:postgresql://localhost:15432/lazy-iot?reWriteBatchedInserts=true

  data:
    # redis配置
    redis:
      # Redis数据库索引（默认为0）
      database: 13
      # Redis服务器地址
      host: localhost
      # Redis服务器连接端口
      port: 6379
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0