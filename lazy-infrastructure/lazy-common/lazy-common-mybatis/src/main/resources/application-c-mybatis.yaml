# mybatis-plus配置详情 https://baomidou.com/config/
mybatis-plus:
  # 启动时是否检查 mybatis XML 文件的存在，默认不检查
  check-config-location: false
  # 指定 mybatis XML 文件的位置
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    # 自动驼峰命名规则（camel case）映射
    map-underscore-to-camel-case: true
    # mybatis 自动映射策略
    auto-mapping-behavior: full
    # mybatis 自动映射时未知列或未知属性处理策略
    auto-mapping-unknown-column-behavior: none
    # mybatis 内部日志记录，默认不记录
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    # 是否打印 Logo banner
    banner: true
    db-config:
      # 主键类型
      id-type: ASSIGN_ID
      # 逻辑已删除值，仅在逻辑删除功能打开时有效。默认值为 1
      logic-delete-value: 1
      # 逻辑未删除值，仅在逻辑删除功能打开时有效。默认值为 0
      logic-not-delete-value: 0
      # 全局的 Entity 逻辑删除字段属性名，仅在逻辑删除功能打开时有效。 当前设置默认为：del_flag
      logic-delete-field: del_flag
      # 控制字段在 Insert 时的字段验证策略。
      insert-strategy: NOT_NULL
      # 控制字段在 Update 时的字段验证策略。
      update-strategy: NOT_NULL
      # 控制字段在 Where 条件构造时的字段验证策略。
      where-strategy: NOT_NULL
